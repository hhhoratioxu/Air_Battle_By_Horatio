name: Build Windows EXE

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "build/**"
      - "electron/**"
      - "game.js"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "style.css"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v1.0.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer and portable EXE
        run: npm run dist:win

      - name: Verify build output
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path dist -Filter "*.exe" -File)
          if ($files.Count -ne 2) {
            throw "Expected two EXE files, found $($files.Count)."
          }
          $files | ForEach-Object {
            Write-Host "$($_.Name) — $([math]::Round($_.Length / 1MB, 2)) MB"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEON-STRIKE-Windows-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path dist -Filter "*.exe" -File | Select-Object -ExpandProperty FullName)
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $env:RELEASE_TAG @files --clobber
          } else {
            & gh release create $env:RELEASE_TAG @files `
              --target $env:GITHUB_SHA `
              --title "NEON STRIKE v1.0.0" `
              --notes "Windows x64 desktop release. Includes an installer and a portable edition. The application is unsigned, so Windows SmartScreen may ask for confirmation on first launch."
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publishing failed."
          }

